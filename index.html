<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warlord OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #121212);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --card-bg: var(--tg-theme-secondary-bg-color, #1e1e1e);
            --btn-bg: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --accent: #00d26a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .header span {
            font-size: 14px;
            opacity: 0.7;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 25px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card .value {
            font-size: 22px;
            font-weight: bold;
            color: var(--accent);
        }

        .card .value.off {
            color: #ff3b30;
        }

        .controls {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-danger {
            background-color: #ff3b30;
            color: white;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🎯 WARLORD OS</h1>
        <span>Centro de Comando Tático</span>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Auto-Forward</h3>
            <div class="value" id="val-auto">...</div>
        </div>
        <div class="card">
            <h3>Sono Manual</h3>
            <div class="value" id="val-sleep">...</div>
        </div>
        <div class="card">
            <h3>Auto Sleep <br><span style="font-size:10px; opacity:0.6;">(00h - 07h30)</span></h3>
            <div class="value" id="val-autosleep">...</div>
        </div>
        <div class="card">
            <h3>Cloud API <br><span style="font-size:10px; opacity:0.6;">(Browserless)</span></h3>
            <div class="value" id="val-cloud">...</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="executarComando('toggle_auto')">⚡ Alternar Auto-Forward</button>
        <button class="btn" onclick="executarComando('toggle_sleep')">🌙 Alternar Sono Manual</button>
        <button class="btn" onclick="executarComando('toggle_autosleep')">⏰ Alternar Auto-Sleep</button>
        <button class="btn" onclick="executarComando('status')"
            style="background-color: #323232; border: 1px solid #4a4a4a;">📊 Gerar Relatório Status</button>
        <button class="btn btn-danger" onclick="executarComando('limpar_fila')">🧹 Esvaziar Fila WhatsApp</button>
        <button class="btn" onclick="tg.close()"
            style="background-color: transparent; border: 1px solid var(--btn-bg); color: var(--btn-bg); margin-top: 10px;">Fechar
            Painel</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Leitura Dinâmica dos Parâmetros da URL
        const params = new URLSearchParams(window.location.search);
        const auto = params.get('auto') || 'OFF';
        const sleep = params.get('sleep') || 'OFF';
        const autosleep = params.get('autosleep') || 'OFF';
        const cloud = params.get('cloud') || 'OFF';

        // Aplica os valores na interface com cores inteligentes
        const elAuto = document.getElementById('val-auto');
        elAuto.innerText = auto;
        if (auto === 'OFF') elAuto.classList.add('off');

        const elSleep = document.getElementById('val-sleep');
        elSleep.innerText = sleep;
        if (sleep === 'OFF') elSleep.classList.add('off');

        const elAutoSleep = document.getElementById('val-autosleep');
        elAutoSleep.innerText = autosleep;
        if (autosleep === 'OFF') elAutoSleep.classList.add('off');

        const elCloud = document.getElementById('val-cloud');
        elCloud.innerText = cloud;
        if (cloud === 'OFF') elCloud.classList.add('off');

        // Função de Deep Linking (Painel -> Telegram Bot)
        function executarComando(comando) {
            // Exige confirmação para ação destrutiva
            if (comando === 'limpar_fila' && !confirm('Tem certeza que deseja APAGAR a fila do WhatsApp?')) return;

            // O nome do bot DEVE ser configurado pelo usuário no script final
            const botUsername = "MeuControleRemoto_bot";
            const link = `https://t.me/${botUsername}?start=${comando}`;

            tg.openTelegramLink(link);
            tg.close();
        }
    </script>
</body>

</html>
